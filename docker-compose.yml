services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      STRAVA_TOKEN_FILE: /data/strava-token.json
    volumes:
      - strava-data:/data
      # Persist Next.js's fetch/data cache so a rebuild doesn't wipe it and cold-
      # start a burst of Strava API calls (which can blow the daily rate limit).
      - next-cache:/app/.next/cache
    # Pangolin (external reverse proxy) terminates TLS and forwards to this port
    # over plain HTTP. No 80/443 handling here.
    ports:
      - "3000:3000"

volumes:
  strava-data:
  next-cache:
